name: scan

on:
  schedule:
    - cron: "0 13 * * 1-5"   # 18:30 IST, Mon-Fri (after market close)
  workflow_dispatch: {}       # manual "Run workflow" button on the Actions page

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Fetch fundamentals (Screener.in)
        run: python fetch.py
      - name: Fetch weekly prices (Yahoo Finance)
        run: python fetch_prices.py
      - name: Scan and rebuild dashboard
        run: python scan.py
      - name: Publish if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "scan $(date -u +%F)"
          git push
